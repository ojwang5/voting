{% extends 'base.html' %}

{% block title %}Voter Phone Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">Voter Login (Phone)</div>
      <div class="card-body">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          {{ form.phone.label_tag }}
          {{ form.phone }}
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary">Continue</button>
            <a href="{% url 'polls:login' %}" class="btn btn-outline-secondary">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
