{% extends 'base.html' %}

{% block title %}Logged Out - Voting System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card border-0 bg-transparent">
            <div class="card-body p-5">
                <i class="bi bi-box-arrow-left display-1 text-success mb-4"></i>
                <h1 class="display-5 fw-bold mb-4">See You Soon!</h1>
                <p class="lead mb-5 text-muted">You have been successfully logged out of VotingHub.</p>
                <div class="d-grid gap-3 col-8 mx-auto">
                    <a href="{% url 'polls:login' %}" class="btn btn-primary btn-lg py-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Again
                    </a>
                    <a href="{% url 'polls:index' %}" class="btn btn-outline-primary btn-lg py-3">
                        <i class="bi bi-house me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
