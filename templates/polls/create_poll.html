<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Poll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2>Create New Poll</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.question.label_tag }}
                        {{ form.question }}
                        {% if form.question.errors %}
                            <div class="text-danger">{{ form.question.errors }}</div>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        {{ form.description.label_tag }}
                        {{ form.description }}
                    </div>
                    <div class="mb-3">
                        {{ form.close_date.label_tag }}
                        {{ form.close_date }}
                    </div>
                    <button type="submit" class="btn btn-success">Create Poll</button>
                    <a href="{% url 'polls:index' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
